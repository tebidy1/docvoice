<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إذن الوصول للميكروفون - SootNote</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #0f172a;
            color: white;
            text-align: center;
        }
        .container {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 450px;
            border: 1px solid #334155;
        }
        h2 {
            margin-top: 0;
            color: #38bdf8;
        }
        p {
            line-height: 1.6;
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 25px;
            transition: all 0.2s;
        }
        button:hover {
            background-color: #7dd3fc;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎙️</div>
        <h2>مطلوب إذن الوصول للميكروفون</h2>
        <p>لتتمكن من تسجيل الملاحظات الصوتية باستخدام إضافة <b>SootNote</b>، نحتاج منك منح إذن الوصول للميكروفون.</p>
        <p>يرجى الضغط على الزر أدناه ثم اختيار "السماح" (Allow) عندما يظهر طلب المتصفح.</p>
        <button id="requestBtn">منح الإذن الآن</button>
        <div class="footer">بمجرد منح الإذن، يمكنك إغلاق هذه الصفحة والعودة للإضافة.</div>
    </div>
    <script>
        document.getElementById('requestBtn').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Stop tracks immediately
                stream.getTracks().forEach(track => track.stop());
                
                // Show success and close
                const btn = document.getElementById('requestBtn');
                btn.textContent = "تم منح الإذن بنجاح!";
                btn.style.backgroundColor = "#22c55e";
                btn.style.color = "white";
                
                setTimeout(() => {
                    window.close();
                }, 1500);
            } catch (err) {
                console.error("Permission error:", err);
                alert("تعذر الحصول على الإذن. يرجى التأكد من السماح للمتصفح بالوصول للميكروفون من إعدادات الموقع.");
            }
        };

        // Automatically try to request on load if possible (might still need click)
        window.onload = () => {
            // Some browsers allow it if triggered by user intent to open this page
            // but usually a click is safer.
        };
    </script>
</body>
</html>
