name: soutnote
description: "SoutNote: AI-powered medical dictation widget and mobile companion."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1

  # Desktop Window Control
  window_manager: ^0.5.1
  
  # Audio & Networking
  speech_to_text: ^7.3.0
  record: ^6.0.0
  web_socket_channel: ^3.0.3
  shelf: ^1.4.1
  shelf_web_socket: ^2.0.1
  http: ^1.2.0
  dio: ^5.4.0
  connectivity_plus: ^7.0.0
  
  # AI & Logic
  google_generative_ai: ^0.4.7


  # Shared Logic (Moved to Backend)
  # scribe_brain:
  #   path: packages/scribe_brain
  
  # Local Database - Enabled for Windows/Desktop (Isar doesn't support web)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2
  
  # Utils
  uuid: ^4.3.3
  permission_handler: ^12.0.1
  vibration: ^3.1.0
  universal_io: ^2.3.1
  flutter_secure_storage: ^9.2.2
  
  # Windows-specific
  win32: ^5.5.0
  ffi: ^2.1.0
  
  # QR Pairing
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.1
  
  # UI
  google_fonts: ^6.2.1
  glassmorphism: ^3.0.0
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  screen_retriever: ^0.2.0
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  
  # Web compatibility
  web: 1.0.0
  url_strategy: ^0.3.0
  sherpa_onnx: ^1.12.25
  pointycastle: ^3.9.1
  crypto: ^3.0.3
  flutter_svg: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  web:
    generate: true
    image_path: "assets/images/launcher_icon_source.png"
    background_color: "#ffffff"
    theme_color: "#0F172A"
  image_path: "assets/images/launcher_icon_source.png"
  adaptive_icon_background: "#ffffff" # Using white background for the adaptive icon
  adaptive_icon_foreground: "assets/images/launcher_icon_source.png"
  
  # Testing dependencies
  mockito: ^5.4.4
  fake_async: ^1.3.1
  
  # Property-based testing (custom implementation)
  # Note: Dart doesn't have a mature property-based testing library like QuickCheck
  # We'll implement a simple property testing framework

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/landing/
    - assets/models/
    - assets/hotwords/

